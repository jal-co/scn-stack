name: ✨ Feature Request
description: Suggest a new flag, prompt, generator behaviour, or DX improvement
labels: ["feature"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for scn-stack? We'd love to hear it.

        **Want a new framework or docs engine?** Use the [📦 Framework / Docs Engine Support](https://github.com/jal-co/scn-stack/issues/new?template=framework.yml) template instead.

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - New CLI flag or prompt option
        - New subcommand
        - Improved generator output (registry.json, README, etc.)
        - DX improvement (errors, prompts, TUI)
        - Website / docs (scnstack.sh)
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What would you like to see?
      description: Describe the feature and why it would be useful
      placeholder: "Add a `--license` flag so the generated package.json picks up Apache-2.0 / ISC / etc."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed API / behaviour
      description: If applicable, what should the command, flag, or generated output look like?
      placeholder: |
        npx create-scn-stack my-ui --license apache-2.0
        # writes "license": "Apache-2.0" to package.json
      render: bash
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you've tried or other tools that solve this
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, screenshots, examples from other CLIs (create-t3-app, create-vite, etc.)
    validations:
      required: false
