# Dependabot configuration
# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# Security-only mode: `open-pull-requests-limit: 0` disables routine version-
# update PRs for each ecosystem, while Dependabot security updates (enabled in
# the repo settings) still open PRs for actual advisories. This keeps the noise
# down while preserving automated patching for real vulnerabilities.
#
# Three ecosystems are watched:
#   - npm (root)  — the create-scn-stack CLI
#   - npm (/www)  — the scnstack.sh site (pnpm lockfile)
#   - github-actions — workflow action versions
#
# Commit prefixes / labels keep security PRs passing commit-check and labeled.
version: 2

updates:
  # --- CLI (root) ---
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    # Security updates only — no routine version-bump PRs.
    open-pull-requests-limit: 0
    labels:
      - "chore"
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
      include: "scope"

  # --- Website (www, pnpm) ---
  - package-ecosystem: "npm"
    directory: "/www"
    schedule:
      interval: "weekly"
      day: "monday"
    # Security updates only — no routine version-bump PRs.
    open-pull-requests-limit: 0
    labels:
      - "chore"
      - "website"
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
      include: "scope"

  # --- GitHub Actions ---
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    # Security updates only — no routine version-bump PRs.
    open-pull-requests-limit: 0
    labels:
      - "ci"
    commit-message:
      prefix: "ci"
      include: "scope"
